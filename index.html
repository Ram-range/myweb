<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodOrder</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  🍔 FoodOrder
  <button onclick="toggleCart()">🛒</button>
</div>

<div class="menu">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Bakso_malang.jpg">
<h3>Bakso</h3>
<p>Rp 20000</p>
<button onclick="addToCart('Bakso',20000)">Tambah</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Mie_ayam_jakarta.jpg">
<h3>Mie Ayam</h3>
<p>Rp 18000</p>
<button onclick="addToCart('Mie Ayam',18000)">Tambah</button>
</div>

<div class="Card">
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Nasi_goreng_indonesia.jpg">
<h3>Nasi Goreng</h3>
<p>Rp 22000</p>
<button onclick="addToCart('Nasi Goreng',22000)">Tambah</button>
</div>

</div>

<!-- CART -->
<div id="cart" class="cart">
<div class="cart-header">
  <h3>Keranjang</h3>
  <button onclick="toggleCart()">❌</button>
</div>

<div id="cartItems"></div>

<div class="cart-footer">
<input type="text" id="alamat" placeholder="Alamat...">
<h3>Total: Rp <span id="total">0</span></h3>
<button onclick="checkout()">Pesan</button>
</div>
</div>

<div id="toast" class="toast">Berhasil ditambahkan!</div>

<footer class="footer">
  Dibuat oleh Daniel © 2025
</footer>

<script src="script.js"></script>
</body>
</html>
